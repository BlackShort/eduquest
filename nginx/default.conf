# ─────────────────────────────────────────────────────────
# HTTP → HTTPS REDIRECT
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name codealpha.me www.codealpha.me;

    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────
# HTTPS SERVER (MAIN API GATEWAY)
# ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name codealpha.me www.codealpha.me;

    ssl_certificate     /etc/letsencrypt/live/codealpha.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codealpha.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ─────────────────────────────────────────────────────
    # GLOBAL CORS HANDLER (applies everywhere)
    # ─────────────────────────────────────────────────────
    set $cors_origin "";

    if ($http_origin ~* ^https://(www\.codealpha\.app)$) {
        set $cors_origin $http_origin;
    }

    # Handle preflight globally
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Add CORS headers to all responses
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;

    # ─────────────────────────────────────────────────────
    # INTERNAL AUTH CHECK (not public)
    # ─────────────────────────────────────────────────────
    location = /internal/verify {
        internal;
        proxy_pass              http://auth:5001/v1/verify-token;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie        $http_cookie;
        proxy_set_header        Authorization $http_authorization;
    }

    # ─────────────────────────────────────────────────────
    # AUTH SERVICE (PUBLIC)
    # URL → /auth/v1/*
    # ─────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://auth:5001/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    
    # ─────────────────────────────────────────────────────
    # CONTENT SERVICE (PROTECTED)
    # URL → /content/v1/*
    # ─────────────────────────────────────────────────────
    location /content/ {

        auth_request /internal/verify;

        auth_request_set $x_user_id   $upstream_http_x_user_id;
        auth_request_set $x_user_role $upstream_http_x_user_role;
        auth_request_set $x_username  $upstream_http_x_username;

        proxy_set_header X-Student-Id    $x_user_id;
        proxy_set_header X-User-Role     $x_user_role;
        proxy_set_header X-Username      $x_username;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://content:5002/;
    }

    # ─────────────────────────────────────────────────────
    # CODE SERVICE (PROTECTED)
    # URL → /code/v1/*
    # ─────────────────────────────────────────────────────
    location /code/ {

        auth_request /internal/verify;

        auth_request_set $x_user_id   $upstream_http_x_user_id;
        auth_request_set $x_user_role $upstream_http_x_user_role;
        auth_request_set $x_username  $upstream_http_x_username;

        proxy_set_header X-Student-Id    $x_user_id;
        proxy_set_header X-User-Role     $x_user_role;
        proxy_set_header X-Username      $x_username;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://code:5003/;
    }

    # ─────────────────────────────────────────────────────
    # PROCTOR SERVICE (PROTECTED)
    # URL → /proctor/v1/*
    # ─────────────────────────────────────────────────────
    location /proctor/ {

        auth_request /internal/verify;

        auth_request_set $x_user_id   $upstream_http_x_user_id;
        auth_request_set $x_user_role $upstream_http_x_user_role;
        auth_request_set $x_username  $upstream_http_x_username;

        proxy_set_header X-Student-Id    $x_user_id;
        proxy_set_header X-User-Role     $x_user_role;
        proxy_set_header X-Username      $x_username;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://proctor:5004/;
    }

    # ─────────────────────────────────────────────────────
    # JUDGE0 (PUBLIC, EXTERNAL SERVICE)
    # URL → /judge/*
    # ─────────────────────────────────────────────────────
    location /judge/ {
        proxy_pass http://13.54.92.185:2358/;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}