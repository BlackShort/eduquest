server {
    listen 80;

    # ── STATIC CLIENT (SPA) ─────────────────────────────────────────────────
    # Uncomment once the React build is copied into the nginx image
    # root /usr/share/nginx/html;
    # index index.html;
    # location / {
    #     try_files $uri /index.html;
    # }

    # ── INTERNAL: token-verification sub-request ─────────────────────────────
    # Used by auth_request; never accessible from outside.
    # nginx strips nothing here — calls the auth service directly.
    location = /internal/verify {
        internal;
        proxy_pass              http://auth:5001/v1/verify-token;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        # Forward original cookies & auth header so the session can be validated
        proxy_set_header        Cookie          $http_cookie;
        proxy_set_header        Authorization   $http_authorization;
    }

    # ── AUTH SERVICE  (public — no token required) ───────────────────────────
    # URL pattern : /auth/v1/<route>
    # nginx strips /auth/ prefix  →  auth:5001 sees /v1/<route>
    location /auth/ {
        proxy_pass              http://auth:5001/;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
    }

    # ── PROCTOR SERVICE  (protected) ─────────────────────────────────────────
    # URL pattern : /proctor/v1/<route>
    # nginx strips /proctor/ prefix  →  proctor:5004 sees /v1/<route>
    location /proctor/ {
        auth_request /internal/verify;

        # Pull user identity out of the verify response headers
        auth_request_set $x_user_id   $upstream_http_x_user_id;
        auth_request_set $x_user_role $upstream_http_x_user_role;
        auth_request_set $x_username  $upstream_http_x_username;

        # Inject identity into the upstream request (read by authFromGateway middleware)
        proxy_set_header X-Student-Id   $x_user_id;
        proxy_set_header X-User-Role    $x_user_role;
        proxy_set_header X-Username     $x_username;
        proxy_set_header Host           $host;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://proctor:5004/;
    }

    # ── CONTENT SERVICE  (protected) ─────────────────────────────────────────
    # URL pattern : /content/v1/<route>
    # location /content/ {
